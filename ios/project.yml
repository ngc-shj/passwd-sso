name: PasswdSSO

options:
  bundleIdPrefix: jp.jpng.passwd-sso
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  usesTabs: false
  indentWidth: 2
  tabWidth: 2
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SWIFT_STRICT_CONCURRENCY: complete
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "4789NDA9RQ"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    GENERATE_INFOPLIST_FILE: NO
    # Xcode 16+ defaults this to YES for Debug, splitting target code into a
    # separate `.debug.dylib`. That breaks AutoFill (and other) app extensions:
    # the extension is signed/embedded but iOS won't surface it in
    # Settings → AutoFill & Passwords. Disable so the extension code lives in
    # its main binary and registers correctly.
    ENABLE_DEBUG_DYLIB: NO

configFiles:
  Debug: Configs/Common.xcconfig
  Release: Configs/Common.xcconfig

targets:
  Shared:
    type: framework
    platform: iOS
    sources:
      - path: Shared
        excludes:
          - "README.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: jp.jpng.passwd-sso.Shared
        DEFINES_MODULE: YES
        APPLICATION_EXTENSION_API_ONLY: YES
        SKIP_INSTALL: YES
        GENERATE_INFOPLIST_FILE: YES
        # CFBundleVersion (build number) tracks MARKETING_VERSION so a
        # release-please version bump advances the build number too — no manual
        # bump before each App Store upload. (Re-uploading the *same* marketing
        # version would need a manual unique suffix, which normal releases never
        # hit.) Applied to every target below as well.
        CURRENT_PROJECT_VERSION: $(MARKETING_VERSION)
        MARKETING_VERSION: "0.4.71" # x-release-please-version

  PasswdSSOApp:
    type: application
    platform: iOS
    sources:
      - path: PasswdSSOApp
        excludes:
          - "README.md"
          - "Info.plist"
          - "PasswdSSOApp.entitlements"
    info:
      path: PasswdSSOApp/Info.plist
      properties:
        CFBundleDisplayName: passwd-sso
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        # The app uses only standard cryptography (AES-256-GCM, PBKDF2, HKDF via
        # CryptoKit/CommonCrypto) for authentication and data protection — no
        # proprietary algorithms. This qualifies for the export-compliance
        # exemption, so we declare false and skip the per-build encryption
        # questionnaire / annual self-classification report.
        ITSAppUsesNonExemptEncryption: false
        # Required for the LAContext biometric gate (vault unlock / entry
        # reveal). iOS hard-crashes any Face ID access without this key.
        NSFaceIDUsageDescription: passwd-sso uses Face ID to confirm it's you before unlocking your vault and revealing credentials.
        # Custom URL scheme for the OAuth sign-in callback. The server 302s the
        # ASWebAuthenticationSession to `passwd-sso://auth/callback?code&state`;
        # iOS captures it by scheme — works for ANY self-hosted server host,
        # unlike Universal Links which require the host baked into the
        # entitlement at sign time.
        CFBundleURLTypes:
          - CFBundleURLName: jp.jpng.passwd-sso.auth
            CFBundleURLSchemes:
              - passwd-sso
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        # BGTaskScheduler rejects register()/submit() for identifiers not
        # declared here, and BGProcessingTaskRequest additionally requires the
        # "processing" background mode (BackgroundSyncTask.identifier).
        BGTaskSchedulerPermittedIdentifiers:
          - com.passwd-sso.cache-sync
        UIBackgroundModes:
          - processing
    entitlements:
      path: PasswdSSOApp/PasswdSSOApp.entitlements
      properties:
        # Apple mandates this entitlement on BOTH the AutoFill extension and
        # its host app ("Do this for both your Password AutoFill extension and
        # its host app"):
        # https://developer.apple.com/documentation/bundleresources/entitlements/com.apple.developer.authentication-services.autofill-credential-provider
        # Every shipping credential manager (Bitwarden, KeePassium, Strongbox,
        # Proton Pass, …) carries it on the host target too. Without it,
        # AuthenticationServicesAgent rejects the host↔extension relationship
        # and the provider never works (and may not be listed in
        # Settings → General → AutoFill & Passwords).
        com.apple.developer.authentication-services.autofill-credential-provider: true
        com.apple.security.application-groups:
          - group.jp.jpng.passwd-sso.shared
        keychain-access-groups:
          - $(AppIdentifierPrefix)jp.jpng.passwd-sso.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: jp.jpng.passwd-sso
        CURRENT_PROJECT_VERSION: $(MARKETING_VERSION)
        MARKETING_VERSION: "0.4.71" # x-release-please-version
        TARGETED_DEVICE_FAMILY: "1"
        # Single-size (1024) AppIcon in PasswdSSOApp/Assets.xcassets. xcodegen
        # also auto-derives this from the AppIcon.appiconset presence; the
        # explicit line locks intent and keeps project.yml authoritative for CI
        # (which regenerates the .xcodeproj from this file).
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: Shared
        embed: true
      - target: PasswdSSOAutofillExtension
        # embed: true puts the .appex into <App>.app/PlugIns/ which is where
        # iOS scans for credential provider extensions. Without it the
        # extension is built but not bundled and never appears in
        # Settings → AutoFill & Passwords.
        embed: true

  PasswdSSOAutofillExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: PasswdSSOAutofillExtension
        excludes:
          - "README.md"
          - "Info.plist"
          - "PasswdSSOAutofillExtension.entitlements"
    info:
      path: PasswdSSOAutofillExtension/Info.plist
      properties:
        CFBundleDisplayName: passwd-sso AutoFill
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # See host app note — standard crypto only, export-compliance exempt.
        ITSAppUsesNonExemptEncryption: false
        # The extension reads bridge_key behind a per-fill LAContext biometric
        # prompt; iOS hard-crashes any Face ID access without this key.
        NSFaceIDUsageDescription: passwd-sso uses Face ID to confirm it's you before filling a credential.
        NSExtension:
          NSExtensionPointIdentifier: com.apple.authentication-services-credential-provider-ui
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).CredentialProviderViewController
          NSExtensionAttributes:
            # Both keys required so iOS lists this provider for password fills
            # AND TOTP fills. With only ProvidesOneTimeCodes set, iOS treats
            # the provider as TOTP-only and hides it from the password
            # AutoFill picker.
            ASCredentialProviderExtensionCapabilities:
              ProvidesPasswords: true
              ProvidesOneTimeCodes: true
              # Passkey assertion (sign-in).
              ProvidesPasskeys: true
              # Passkey registration (creation). Without this key iOS never
              # routes prepareInterface(forPasskeyRegistration:) to us (F4).
              ProvidesPasskeyRegistration: true
    entitlements:
      path: PasswdSSOAutofillExtension/PasswdSSOAutofillExtension.entitlements
      properties:
        # Apple official AutoFill Credential Provider entitlement — REQUIRED
        # for iOS to surface this extension in Settings → AutoFill source list.
        # Without it, pluginkit registers the bundle generically but the
        # AutoFill subsystem silently excludes it. Per Apple docs:
        # https://developer.apple.com/documentation/bundleresources/entitlements/com.apple.developer.authentication-services.autofill-credential-provider
        com.apple.developer.authentication-services.autofill-credential-provider: true
        com.apple.security.application-groups:
          - group.jp.jpng.passwd-sso.shared
        keychain-access-groups:
          - $(AppIdentifierPrefix)jp.jpng.passwd-sso.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: jp.jpng.passwd-sso.PasswdSSOAutofillExtension
        APPLICATION_EXTENSION_API_ONLY: YES
        CURRENT_PROJECT_VERSION: $(MARKETING_VERSION)
        MARKETING_VERSION: "0.4.71" # x-release-please-version
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: Shared
        link: true
        embed: false

  PasswdSSOTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PasswdSSOTests
      - path: ../extension/test/fixtures
        buildPhase: resources
        type: folder
    info:
      path: PasswdSSOTests/Info.plist
      properties:
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
    entitlements:
      path: PasswdSSOTests/PasswdSSOTests.entitlements
      properties:
        com.apple.security.application-groups:
          - group.jp.jpng.passwd-sso.shared
        keychain-access-groups:
          - $(AppIdentifierPrefix)jp.jpng.passwd-sso.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: jp.jpng.passwd-sso.PasswdSSOTests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/PasswdSSOApp.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/PasswdSSOApp
        BUNDLE_LOADER: $(TEST_HOST)
        CURRENT_PROJECT_VERSION: $(MARKETING_VERSION)
        MARKETING_VERSION: "0.4.71" # x-release-please-version
    dependencies:
      - target: Shared
        link: true
        embed: false
      - target: PasswdSSOApp

  PasswdSSOUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PasswdSSOUITests
    info:
      path: PasswdSSOUITests/Info.plist
      properties:
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: jp.jpng.passwd-sso.PasswdSSOUITests
        TEST_TARGET_NAME: PasswdSSOApp
        CURRENT_PROJECT_VERSION: $(MARKETING_VERSION)
        MARKETING_VERSION: "0.4.71" # x-release-please-version
    dependencies:
      - target: PasswdSSOApp

schemes:
  PasswdSSOApp:
    build:
      targets:
        PasswdSSOApp: all
        PasswdSSOAutofillExtension: all
        Shared: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PasswdSSOTests
        - PasswdSSOUITests
    archive:
      config: Release
    profile:
      config: Release
    analyze:
      config: Debug

  # Debug-only scheme for the AutoFill credential provider extension. Running it
  # launches a chosen host app (e.g. Safari) and attaches Xcode to the extension
  # process when iOS invokes it — so the extension's os_log/Logger output appears
  # in the Xcode console and breakpoints work (the App scheme cannot attach to the
  # separate extension process). launchAutomaticallySubstyle 2 marks it as an
  # app-extension run target.
  PasswdSSOAutofillExtension:
    build:
      targets:
        PasswdSSOAutofillExtension: all
        Shared: all
    run:
      config: Debug
      askForAppToLaunch: true
      launchAutomaticallySubstyle: "2"

  Shared:
    build:
      targets:
        Shared: all
    test:
      config: Debug
      targets:
        - PasswdSSOTests
