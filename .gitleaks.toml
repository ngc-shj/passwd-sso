# gitleaks config — extends the default ruleset with allowlists for this repo's
# test fixtures, sample data, docs, and a few non-secret code markers. Production
# source is still scanned. Used by the CI secret-scan job (.github/workflows/ci.yml)
# and any local `gitleaks dir . --config .gitleaks.toml` run.
#
# When adding an allowlist entry, prefer the narrowest scope (a specific path or a
# unique regex) over broad suppression, and explain why the match is not a secret.

[extend]
useDefault = true

[[allowlists]]
description = "Test files, fixtures, sample export data, and sample import/export assets hold non-secret test vectors / mock tokens (RFC 6238 TOTP vectors, SSH-key fixtures, example API tokens, sample CSV/JSON exports). Scoped to the specific sample-asset files rather than all of docs/ so a real credential accidentally committed anywhere else under docs/ is still scanned (2026-07 review, F7)."
paths = [
  '''.*\.test\.(ts|tsx|swift)$''',
  '''.*\.spec\.(ts|tsx)$''',
  '''(^|/)__tests__/''',
  '''(^|/)test/fixtures/''',
  '''^ios/.*Tests/.*''',
  '''^docs/assets/[^/]+\.(csv|json)$''',
]

[[allowlists]]
description = "SSH-key format/parser source files: the only key-shaped strings are PEM header markers used for format detection, not real key material."
paths = [
  '''^cli/src/lib/openssh-key-parser\.ts$''',
  '''^src/lib/format/ssh-key\.ts$''',
]

[[allowlists]]
description = "Crypto KDF constant identifier, not a credential (generic-api-key false positive)."
regexTarget = "match"
regexes = [
  '''VERIFIER_PBKDF2_BITS''',
]

[[allowlists]]
description = "Illustrative non-secret example values in design/review docs (2026-07 review, F7 — replaces the former blanket ^docs/ suppression). The base64 string decodes to the literal phrase 'this is a secret password'; PrivateKeyInfo is a PKCS#8 type name; the dcr-cleanup line is a curl example with no credential. Scoped to docs/ so these do not suppress matches elsewhere in the tree."
paths = ['''^docs/''']
regexTarget = "match"
regexes = [
  '''dGhpcyBpcyBhIHNlY3JldCBwYXNzd29yZA''',
  '''PrivateKeyInfo, WebCrypto''',
  '''/api/maintenance/dcr-cleanup''',
]

[[allowlists]]
description = "CryptoKit type names in crypto source, not credentials (generic-api-key false positives on `P256.Signing.PrivateKey` in PasskeyRegistration.swift and `P256.KeyAgreement.PrivateKey` in the team-key ECDH code)."
regexTarget = "match"
regexes = [
  '''P256\.Signing\.PrivateKey''',
  '''P256\.KeyAgreement\.PrivateKey''',
]
