# Development overrides - automatically merged with docker-compose.yml
# This file exposes ports for local development.
# Do NOT use in production.
services:
  db:
    ports:
      - "5432:5432"

  jackson:
    ports:
      - "5225:5225"

  redis:
    ports:
      - "6379:6379"

  audit-outbox-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env.local
    environment:
      - DATABASE_URL=postgresql://passwd_outbox_worker:passwd_outbox_pass@db:5432/passwd_sso
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["npx", "tsx", "scripts/audit-outbox-worker.ts"]
    restart: unless-stopped
    networks:
      - internal

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
