# Development overrides - automatically merged with docker-compose.yml
# This file exposes ports for local development.
# Do NOT use in production.
services:
  db:
    ports:
      - "127.0.0.1:5432:5432"

  jackson:
    ports:
      - "127.0.0.1:5225:5225"

  redis:
    ports:
      - "127.0.0.1:6379:6379"

  audit-outbox-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      # See docker-compose.yml app service for the .env vs .env.local note.
      - .env
    environment:
      - OUTBOX_WORKER_DATABASE_URL=postgresql://passwd_outbox_worker:${PASSWD_OUTBOX_WORKER_PASSWORD:?PASSWD_OUTBOX_WORKER_PASSWORD is required}@db:5432/passwd_sso
      # Least-privilege: connect ONLY via the scoped worker role. Blank out the
      # broad app DATABASE_URL that env_file: .env would otherwise inject (the
      # worker schema normalizes empty → unset and uses the dedicated URL). This
      # mirrors production, so a regression that reintroduces the app credential
      # is caught in dev.
      - DATABASE_URL=
    depends_on:
      db:
        condition: service_healthy
      migrate:
        # migrate is profile-gated (profiles: ["migrate"] in docker-compose.yml).
        # required: false makes this dependency optional — Compose only waits
        # for migrate when the migrate profile is active (e.g. via `docker
        # compose --profile migrate up`). Without it, Compose v2.20+ rejects
        # the project as "service depends on undefined service: migrate".
        condition: service_completed_successfully
        required: false
    command: ["npx", "tsx", "scripts/audit-outbox-worker.ts"]
    restart: unless-stopped
    networks:
      - internal

  retention-gc-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    container_name: passwd-sso-retention-gc-worker
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      # See docker-compose.yml app service for the .env vs .env.local note.
      - .env
    environment:
      - RETENTION_GC_DATABASE_URL=postgresql://passwd_retention_gc_worker:${PASSWD_RETENTION_GC_WORKER_PASSWORD:?PASSWD_RETENTION_GC_WORKER_PASSWORD is required}@db:5432/passwd_sso
      # Least-privilege: connect ONLY via the scoped worker role. Blank out the
      # broad app DATABASE_URL that env_file: .env would otherwise inject (the
      # worker schema normalizes empty → unset and uses the dedicated URL). This
      # mirrors production, so a regression that reintroduces the app credential
      # is caught in dev.
      - DATABASE_URL=
    depends_on:
      db:
        condition: service_healthy
      migrate:
        # migrate is profile-gated (profiles: ["migrate"] in docker-compose.yml).
        # required: false makes this dependency optional — Compose only waits
        # for migrate when the migrate profile is active (e.g. via `docker
        # compose --profile migrate up`). Without it, Compose v2.20+ rejects
        # the project as "service depends on undefined service: migrate".
        condition: service_completed_successfully
        required: false
    command: ["npx", "tsx", "scripts/retention-gc-worker.ts"]
    restart: unless-stopped
    networks:
      - internal

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "127.0.0.1:1025:1025"   # SMTP
      - "127.0.0.1:8025:8025"   # Web UI

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    # No persistent volume: ephemeral storage for dev/test only
    networks:
      - internal
