apiVersion: apps/v1
kind: Deployment
metadata:
  name: retention-gc-worker
  labels:
    app: passwd-sso
    component: retention-gc-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: passwd-sso
      component: retention-gc-worker
  template:
    metadata:
      labels:
        app: passwd-sso
        component: retention-gc-worker
    spec:
      terminationGracePeriodSeconds: 30
      # Least-privilege: the worker connects via the scoped RETENTION_GC_DATABASE_URL
      # only — the broad app DATABASE_URL is deliberately NOT injected here.
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          # REQUIRED substitution at deploy time. This is an unresolved
          # placeholder — replace with the full immutable ref (ECR registry +
          # @sha256 digest or :vX.Y.Z tag) via Kustomize images:/envsubst/sed.
          # It is intentionally NOT a runnable :latest so a manifest applied
          # without substitution fails fast instead of pulling a mutable image.
          image: "REPLACE_WITH_IMMUTABLE_IMAGE_REF" # e.g. <ACCOUNT>.dkr.ecr.<region>.amazonaws.com/passwd-sso-app@sha256:...
          command: ["node", "dist/retention-gc-worker.js"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: RETENTION_GC_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: retention-gc-worker-db
                  key: retention-gc-database-url
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            # Re-parse env + re-exec the binary in a SEPARATE process. Strictly
            # better than a tautological `process.exit(0)` (catches a broken image
            # / unparseable env), but note its LIMITATION: it does NOT observe the
            # running worker — a hung loop or DB outage will NOT fail this probe.
            # A heartbeat/last-success liveness is the tracked follow-up.
            exec:
              command: ["node", "dist/retention-gc-worker.js", "--validate-env-only"]
            initialDelaySeconds: 60
            periodSeconds: 60
            failureThreshold: 3
          startupProbe:
            exec:
              command: ["node", "dist/retention-gc-worker.js", "--validate-env-only"]
            failureThreshold: 3
            periodSeconds: 5
          readinessProbe:
            exec:
              command: ["node", "dist/retention-gc-worker.js", "--validate-env-only"]
            initialDelaySeconds: 5
            periodSeconds: 10
