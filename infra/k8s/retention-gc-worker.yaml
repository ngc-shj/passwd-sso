apiVersion: apps/v1
kind: Deployment
metadata:
  name: retention-gc-worker
  labels:
    app: passwd-sso
    component: retention-gc-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: passwd-sso
      component: retention-gc-worker
  template:
    metadata:
      labels:
        app: passwd-sso
        component: retention-gc-worker
    spec:
      terminationGracePeriodSeconds: 30
      # Least-privilege: the worker connects via the scoped RETENTION_GC_DATABASE_URL
      # only — the broad app DATABASE_URL is deliberately NOT injected here.
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          # Deploy-time: replace :latest with an immutable version tag or digest
          # (e.g. passwd-sso@sha256:...). The ECR repo is IMMUTABLE.
          image: passwd-sso:latest
          command: ["node", "dist/retention-gc-worker.js"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: RETENTION_GC_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: retention-gc-worker-db
                  key: retention-gc-database-url
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            # Re-validate env on each liveness check — verifies env still parses
            # AND the binary still runs. Cheaper than a network probe and avoids
            # masking DB outages with a tautological process.exit(0).
            exec:
              command: ["node", "dist/retention-gc-worker.js", "--validate-env-only"]
            initialDelaySeconds: 60
            periodSeconds: 60
            failureThreshold: 3
          startupProbe:
            exec:
              command: ["node", "dist/retention-gc-worker.js", "--validate-env-only"]
            failureThreshold: 3
            periodSeconds: 5
          readinessProbe:
            exec:
              command: ["node", "dist/retention-gc-worker.js", "--validate-env-only"]
            initialDelaySeconds: 5
            periodSeconds: 10
