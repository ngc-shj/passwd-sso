apiVersion: apps/v1
kind: Deployment
metadata:
  name: dcr-cleanup-worker
  labels:
    app: passwd-sso
    component: dcr-cleanup-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: passwd-sso
      component: dcr-cleanup-worker
  template:
    metadata:
      labels:
        app: passwd-sso
        component: dcr-cleanup-worker
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: worker
          image: passwd-sso:latest
          command: ["node", "dist/dcr-cleanup-worker.js"]
          env:
            - name: DCR_CLEANUP_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dcr-cleanup-worker-db
                  key: dcr-cleanup-database-url
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: passwd-sso-secrets
                  key: database-url
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            # Re-validate env on each liveness check — verifies env still parses
            # AND the binary still runs. Cheaper than a network probe and avoids
            # masking DB outages with a tautological process.exit(0).
            exec:
              command: ["node", "dist/dcr-cleanup-worker.js", "--validate-env-only"]
            initialDelaySeconds: 60
            periodSeconds: 60
            failureThreshold: 3
          startupProbe:
            exec:
              command: ["node", "dist/dcr-cleanup-worker.js", "--validate-env-only"]
            failureThreshold: 3
            periodSeconds: 5
          readinessProbe:
            exec:
              command: ["node", "dist/dcr-cleanup-worker.js", "--validate-env-only"]
            initialDelaySeconds: 5
            periodSeconds: 10
