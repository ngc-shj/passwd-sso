# Redis Sentinel HA overlay
# Usage: docker compose -f docker-compose.yml -f docker-compose.ha.yml up
#
# Provides: 1 master + 2 replicas + 3 sentinels
# App connects via ioredis Sentinel mode (REDIS_SENTINEL=true)

x-sentinel: &sentinel
  image: redis:7-alpine
  # Runtime-env expansion ($$REDIS_PASSWORD) keeps the real value out of compose
  # render-time interpolation and thus out of long-lived process argv.
  # chmod 600 on the copied conf prevents world-readable password exposure.
  entrypoint: ["/bin/sh", "-c", "cp /etc/sentinel-template.conf /tmp/sentinel.conf && chmod 600 /tmp/sentinel.conf && echo \"sentinel auth-pass mymaster $$REDIS_PASSWORD\" >> /tmp/sentinel.conf && echo \"requirepass $$REDIS_PASSWORD\" >> /tmp/sentinel.conf && exec redis-sentinel /tmp/sentinel.conf"]
  environment:
    REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
  volumes:
    - ./infra/redis/sentinel.conf:/etc/sentinel-template.conf:ro
  depends_on:
    redis:
      condition: service_healthy
    redis-replica-1:
      condition: service_healthy
    redis-replica-2:
      condition: service_healthy
  restart: unless-stopped
  networks:
    - internal

services:
  # Override base redis command to include requirepass and masterauth for post-failover rejoin.
  redis:
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}", "--masterauth", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]

  redis-replica-1:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--replicaof", "redis", "6379", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}", "--masterauth", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  redis-replica-2:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--replicaof", "redis", "6379", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}", "--masterauth", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  sentinel-1:
    <<: *sentinel
  sentinel-2:
    <<: *sentinel
  sentinel-3:
    <<: *sentinel

  # Override app environment for Sentinel mode
  app:
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - REDIS_SENTINEL=true
      - REDIS_SENTINEL_HOSTS=sentinel-1:26379,sentinel-2:26379,sentinel-3:26379
      - REDIS_SENTINEL_MASTER_NAME=mymaster
      - REDIS_SENTINEL_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      sentinel-1:
        condition: service_started
      sentinel-2:
        condition: service_started
      sentinel-3:
        condition: service_started
