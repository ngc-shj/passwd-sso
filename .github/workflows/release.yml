name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: "Release Please"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Build the CLI tarball in an UNPRIVILEGED job (contents:read, no id-token).
  # All untrusted code — dependency install scripts, tsc, the build — runs here,
  # where an OIDC publish token cannot be minted even if a dependency is
  # compromised. `--ignore-scripts` removes the install-script vector entirely;
  # the build is plain `tsc` (no lifecycle script needed). The packed tarball
  # (with its recorded sha256) is the only artifact that crosses into the
  # privileged publish job — nothing is re-installed or re-built there.
  build-cli:
    name: "Build CLI tarball"
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      version: ${{ steps.pack.outputs.version }}
      tarball: ${{ steps.pack.outputs.tarball }}
      sha256: ${{ steps.pack.outputs.sha256 }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Match the publish job's toolchain so the tarball is built with the same
      # Node/npm the publish job authenticates with (npm >= 11.5.1 / Node >= 22.14
      # for Trusted Publishing). Pin npm exactly — the lockstep with the Dockerfile
      # and dependency-signatures.yml is guarded by check-npm-version-pin.sh.
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"

      - name: Install pinned npm
        run: npm install -g npm@11.12.1 --ignore-scripts

      - name: Install and build CLI
        working-directory: cli
        run: |
          npm ci --ignore-scripts
          npm run build

      - name: Pack and record digest
        id: pack
        working-directory: cli
        run: |
          set -euo pipefail
          # Verify contents BEFORE packing so a missing dist/index.js or a leaked
          # source map fails the build job, not the publish job.
          FILES=$(npm pack --dry-run 2>&1)
          echo "$FILES"
          echo "$FILES" | grep -qP ' dist/index\.js$' || { echo "::error::dist/index.js missing from package"; exit 1; }
          echo "$FILES" | grep -q '\.js\.map' && { echo "::error::source maps should not be in package"; exit 1; } || true
          VERSION=$(node -p "require('./package.json').version")
          TARBALL="passwd-sso-cli-${VERSION}.tgz"
          npm pack
          [ -f "$TARBALL" ] || { echo "::error::expected packed tarball ${TARBALL} not found"; exit 1; }
          SHA256=$(sha256sum "$TARBALL" | cut -d' ' -f1)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA256}"   >> "$GITHUB_OUTPUT"
          echo "Packed ${TARBALL} (sha256=${SHA256})"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cli-tarball
          path: cli/${{ steps.pack.outputs.tarball }}
          if-no-files-found: error
          retention-days: 1

  # Publish the pre-built tarball. This is the ONLY job with id-token:write.
  # It runs NO dependency install, NO build, and NO repository lifecycle script:
  # `npm publish <tarball>` publishes a tarball spec, which (unlike a directory
  # spec) does not execute prepublishOnly/prepack/prepare. The only code paths
  # reachable here are npm's own publish + OIDC exchange. Do NOT add `npm ci`,
  # `npm run build`, or `tsc` to this job — check-workflow-supply-chain.mjs
  # (findPublishJobIsolationViolation) fails the build if you do.
  publish-cli:
    name: "Publish CLI to npm"
    needs: [release-please, build-cli]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write # OIDC for npm Trusted Publishing
    steps:
      # npm Trusted Publishing requires BOTH npm >= 11.5.1 AND Node >= 22.14.0.
      # The repo .nvmrc pins Node 20 (ships npm 10) for the app; the publish job
      # must NOT inherit it — pin Node 24 here explicitly so OIDC publishing meets
      # the current requirement. Do not switch this back to node-version-file.
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      # Pin the npm version (matches Dockerfile NPM_VER, guarded by
      # check-npm-version-pin.sh) — this job holds id-token:write, so an
      # unpinned npm@latest is a supply-chain path to the OIDC publish token.
      - name: Install pinned npm
        run: npm install -g npm@11.12.1 --ignore-scripts

      - name: Download tarball artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: cli-tarball

      # Re-verify the digest the build job recorded. upload/download-artifact v4+
      # artifacts are immutable within a run, so this is defense-in-depth — but it
      # ties the bytes published here to the bytes the unprivileged build job
      # packed, closing any gap if the artifact store is ever mutated.
      - name: Verify tarball digest
        env:
          EXPECTED_SHA256: ${{ needs.build-cli.outputs.sha256 }}
          TARBALL: ${{ needs.build-cli.outputs.tarball }}
        run: |
          set -euo pipefail
          [ -f "$TARBALL" ] || { echo "::error::tarball ${TARBALL} missing after download"; exit 1; }
          echo "${EXPECTED_SHA256}  ${TARBALL}" | sha256sum -c - \
            || { echo "::error::tarball digest mismatch — build/publish artifact tampered"; exit 1; }
          echo "✓ tarball digest matches build job (${EXPECTED_SHA256})"

      - name: Publish to npm
        env:
          TARBALL: ${{ needs.build-cli.outputs.tarball }}
        # Publish the tarball directly (no `npm ci`/build here). Auth via OIDC
        # Trusted Publishing (no NODE_AUTH_TOKEN). publishConfig.provenance:true
        # is read from the tarball's own package.json, so provenance is emitted
        # for the tarball spec exactly as for a directory publish.
        run: npm publish "$TARBALL"

      # Fail-closed provenance assertion (INV-C1b): publishConfig.provenance:true
      # only *emits* provenance in a supported OIDC context. If the context ever
      # degrades (id-token narrowing, unsupported-context best-effort), the publish
      # still succeeds but ships no attestation. Assert the just-published version
      # actually carries an SLSA provenance attestation, distinguishing a registry
      # lookup error (retry, propagation lag) from a definitive "published but
      # unattested" (hard-fail). Never mask this step's exit.
      # Known operational limit (L1): this reads the dist.attestations metadata
      # shape rather than running the cryptographic `npm audit signatures`
      # verifier, and it does NOT compare the attestation subject digest against
      # the tarball this run built. It is an emission-liveness check — it proves
      # an attestation of the documented predicate type is present, not that the
      # attestation is cryptographically valid or bound to our exact bytes. It
      # fails closed (an absent/degraded attestation hard-fails), never
      # false-green. Full cryptographic verification of the published package runs
      # in the separate verify-published job below.
      - name: Assert published provenance
        env:
          VERSION: ${{ needs.build-cli.outputs.version }}
        run: |
          set -euo pipefail
          echo "Asserting SLSA provenance for passwd-sso-cli@${VERSION}"
          for attempt in 1 2 3 4 5; do
            if VIEW=$(npm view "passwd-sso-cli@${VERSION}" --json 2>/dev/null); then
              PREDICATE=$(echo "$VIEW" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{try{const j=JSON.parse(d);process.stdout.write(j?.dist?.attestations?.provenance?.predicateType||'')}catch{process.stdout.write('')}})")
              if [ "$PREDICATE" = "https://slsa.dev/provenance/v1" ]; then
                echo "✓ SLSA provenance present"
                exit 0
              fi
              echo "attempt ${attempt}: attestation not yet visible (predicate='${PREDICATE}'); retrying for propagation lag"
            else
              echo "attempt ${attempt}: npm view failed (registry/network); retrying"
            fi
            sleep 15
          done
          echo "::error::published passwd-sso-cli@${VERSION} carries no SLSA provenance attestation after retries — OIDC provenance emission may have silently failed"
          exit 1

  # Cryptographic verification of the PUBLISHED package, in an UNPRIVILEGED job
  # (contents:read, no id-token). This closes the gap the old L1 comment deferred
  # to a "weekly sweep" that never actually covered this package: install the
  # just-published version into a clean scratch tree and run the official
  # `npm audit signatures` verifier against it — checking the registry signature
  # and provenance attestation cryptographically, not just metadata presence.
  # It runs `npm install`, so it deliberately lives OUTSIDE the publish job: no
  # OIDC token is mintable here even though it installs a package. Fails closed.
  verify-published:
    name: "Verify published package signature"
    needs: [release-please, build-cli, publish-cli]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install pinned npm
        run: npm install -g npm@11.12.1 --ignore-scripts

      - name: Verify published package signature
        env:
          VERSION: ${{ needs.build-cli.outputs.version }}
        run: |
          set -euo pipefail
          WORK=$(mktemp -d)
          cd "$WORK"
          npm init -y >/dev/null 2>&1
          for attempt in 1 2 3 4 5; do
            if npm install --no-save --ignore-scripts "passwd-sso-cli@${VERSION}" >/dev/null 2>&1; then
              break
            fi
            echo "attempt ${attempt}: install of published version failed (propagation lag); retrying"
            sleep 15
          done
          npm audit signatures
