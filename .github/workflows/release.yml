name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: "Release Please"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-cli:
    name: "Publish CLI to npm"
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write # OIDC for npm Trusted Publishing
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://registry.npmjs.org"

      # Trusted Publishing (OIDC) requires npm >= 11.5.1; Node 20 ships npm 10.
      # Pin the version (matches Dockerfile NPM_VER) — this job holds id-token:write,
      # so an unpinned npm@latest is a supply-chain path to the OIDC publish token.
      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@11.12.1

      - name: Install and build CLI
        working-directory: cli
        run: |
          npm ci
          npm run build

      - name: Verify package contents
        working-directory: cli
        run: |
          FILES=$(npm pack --dry-run 2>&1)
          echo "$FILES"
          echo "$FILES" | grep -qP ' dist/index\.js$' || { echo "::error::dist/index.js missing from package"; exit 1; }
          echo "$FILES" | grep -q '\.js\.map' && { echo "::error::source maps should not be in package"; exit 1; } || true

      - name: Publish to npm
        working-directory: cli
        run: npm publish # Auth via OIDC Trusted Publishing (no NODE_AUTH_TOKEN)
