name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: "Release Please"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Sync lock files after a release is created (via PR, not direct push)
  sync-lock-files:
    name: "Sync lock files"
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    timeout-minutes: 5
    env:
      TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Update lock files
        run: |
          for DIR in . cli extension; do
            if [ -f "$DIR/package-lock.json" ]; then
              (cd "$DIR" && npm install --package-lock-only --ignore-scripts --loglevel=error)
              echo "Synced: $DIR/package-lock.json"
            fi
          done

      - name: Create lock file sync PR
        if: ${{ !cancelled() }}
        run: |
          if git diff --quiet; then
            echo "No lock file changes needed"
            exit 0
          fi

          BRANCH="chore/sync-lock-files-${TAG_NAME}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add --update '*/package-lock.json' package-lock.json
          git commit -m "chore: sync lock files for ${TAG_NAME}"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: sync lock files for ${TAG_NAME}" \
            --body "Automated lock file sync after release ${TAG_NAME}." \
            --base main \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
