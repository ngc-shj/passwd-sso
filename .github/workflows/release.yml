name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

# Publishing toolchain, pinned to an exact Node patch release and the npm it
# bundles. The privileged publish job must NOT fetch npm from the registry
# (that would run externally-sourced code while id-token:write is live); instead
# it uses the npm that ships inside the SHA-pinned setup-node's official Node
# distribution. Node v24.18.0 (current 24.x LTS) bundles npm 11.16.0 and meets
# Trusted Publishing's floor (npm >= 11.5.1, Node >= 22.14.0). Keep this on the
# latest 24.x LTS so security fixes (e.g. the v24.17.0 security release) are
# picked up. When bumping, pick a Node patch whose bundled npm still meets the
# floor and update BOTH values together (they are asserted at runtime).
# Source: https://nodejs.org/dist/index.json
env:
  PUBLISH_NODE_VERSION: "24.18.0"
  PUBLISH_NPM_VERSION: "11.16.0"

jobs:
  release-please:
    name: "Release Please"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Build the CLI tarball in an UNPRIVILEGED job (contents:read, no id-token).
  # All untrusted code — dependency install scripts, tsc, the build — runs here,
  # where an OIDC publish token cannot be minted even if a dependency is
  # compromised. `--ignore-scripts` removes the install-script vector entirely;
  # the build is plain `tsc` (no lifecycle script needed). The packed tarball
  # (with its recorded sha256) is the only artifact that crosses into the
  # privileged publish job — nothing is re-installed or re-built there.
  build-cli:
    name: "Build CLI tarball"
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      version: ${{ steps.pack.outputs.version }}
      tarball: ${{ steps.pack.outputs.tarball }}
      sha256: ${{ steps.pack.outputs.sha256 }}
      integrity: ${{ steps.pack.outputs.integrity }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Use the exact Node patch (and its bundled npm) that the publish job uses,
      # from the SHA-pinned setup-node — no `npm install -g` from the registry.
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.PUBLISH_NODE_VERSION }}

      - name: Verify toolchain versions
        run: |
          set -euo pipefail
          test "$(node --version)" = "v${PUBLISH_NODE_VERSION}" \
            || { echo "::error::node $(node --version), expected v${PUBLISH_NODE_VERSION}"; exit 1; }
          test "$(npm --version)" = "${PUBLISH_NPM_VERSION}" \
            || { echo "::error::npm $(npm --version), expected ${PUBLISH_NPM_VERSION} (bundled with Node ${PUBLISH_NODE_VERSION})"; exit 1; }

      - name: Install and build CLI
        working-directory: cli
        run: |
          npm ci --ignore-scripts
          npm run build

      - name: Pack and record digest
        id: pack
        working-directory: cli
        run: |
          set -euo pipefail
          # Verify contents BEFORE packing so a missing dist/index.js or a leaked
          # source map fails the build job, not the publish job.
          FILES=$(npm pack --dry-run 2>&1)
          echo "$FILES"
          echo "$FILES" | grep -qP ' dist/index\.js$' || { echo "::error::dist/index.js missing from package"; exit 1; }
          echo "$FILES" | grep -q '\.js\.map' && { echo "::error::source maps should not be in package"; exit 1; } || true
          VERSION=$(node -p "require('./package.json').version")
          TARBALL="passwd-sso-cli-${VERSION}.tgz"
          npm pack
          [ -f "$TARBALL" ] || { echo "::error::expected packed tarball ${TARBALL} not found"; exit 1; }
          SHA256=$(sha256sum "$TARBALL" | cut -d' ' -f1)
          # Also record npm's own integrity string (sha512-<base64>) for THIS
          # tarball — this is exactly the value npm stores as dist.integrity when
          # it publishes, so verify-published can compare the registry's published
          # integrity against the bytes we built without depending on npm not
          # re-packing (npm publishes the tarball we hand it verbatim; a directory
          # publish would re-pack, but we publish the tarball spec).
          INTEGRITY=$(node -e "const c=require('crypto'),fs=require('fs');const b=fs.readFileSync('${TARBALL}');process.stdout.write('sha512-'+c.createHash('sha512').update(b).digest('base64'))")
          echo "version=${VERSION}"     >> "$GITHUB_OUTPUT"
          echo "tarball=${TARBALL}"     >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA256}"       >> "$GITHUB_OUTPUT"
          echo "integrity=${INTEGRITY}" >> "$GITHUB_OUTPUT"
          echo "Packed ${TARBALL} (sha256=${SHA256}, integrity=${INTEGRITY})"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cli-tarball
          path: cli/${{ steps.pack.outputs.tarball }}
          if-no-files-found: error
          retention-days: 1

  # Publish the pre-built tarball. This is the ONLY job with id-token:write.
  # It runs NO dependency install, NO build, and NO repository lifecycle script:
  # `npm publish <tarball>` publishes a tarball spec, which (unlike a directory
  # spec) does not execute prepublishOnly/prepack/prepare. The only code paths
  # reachable here are npm's own publish + OIDC exchange. Do NOT add `npm ci`,
  # `npm run build`, or `tsc` to this job — check-workflow-supply-chain.mjs
  # (findPublishJobIsolationViolation) fails the build if you do.
  publish-cli:
    name: "Publish CLI to npm"
    needs: [release-please, build-cli]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write # OIDC for npm Trusted Publishing
    steps:
      # This job holds id-token:write. It uses ONLY the npm bundled in the
      # SHA-pinned setup-node's official Node distribution — it does NOT run
      # `npm install -g npm@...`, because fetching npm from the registry would run
      # externally-sourced code while the OIDC publish token is mintable. The
      # pinned Node patch (env.PUBLISH_NODE_VERSION) bundles an npm that meets
      # Trusted Publishing's floor (npm >= 11.5.1, Node >= 22.14.0); the assert
      # step below fails closed if the toolchain ever drifts.
      # (.nvmrc pins Node 20 / npm 10 for the app — deliberately NOT inherited.)
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.PUBLISH_NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"

      - name: Verify toolchain versions
        run: |
          set -euo pipefail
          test "$(node --version)" = "v${PUBLISH_NODE_VERSION}" \
            || { echo "::error::node $(node --version), expected v${PUBLISH_NODE_VERSION}"; exit 1; }
          test "$(npm --version)" = "${PUBLISH_NPM_VERSION}" \
            || { echo "::error::npm $(npm --version), expected ${PUBLISH_NPM_VERSION} bundled with Node ${PUBLISH_NODE_VERSION} (this OIDC job must use the bundled npm, not a registry fetch)"; exit 1; }

      - name: Download tarball artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: cli-tarball

      # Re-verify the digest the build job recorded. upload/download-artifact v4+
      # artifacts are immutable within a run, so this is defense-in-depth — but it
      # ties the bytes published here to the bytes the unprivileged build job
      # packed, closing any gap if the artifact store is ever mutated.
      - name: Verify tarball digest
        env:
          EXPECTED_SHA256: ${{ needs.build-cli.outputs.sha256 }}
          TARBALL: ${{ needs.build-cli.outputs.tarball }}
        run: |
          set -euo pipefail
          [ -f "$TARBALL" ] || { echo "::error::tarball ${TARBALL} missing after download"; exit 1; }
          echo "${EXPECTED_SHA256}  ${TARBALL}" | sha256sum -c - \
            || { echo "::error::tarball digest mismatch — build/publish artifact tampered"; exit 1; }
          echo "✓ tarball digest matches build job (${EXPECTED_SHA256})"

      - name: Publish to npm
        env:
          TARBALL: ${{ needs.build-cli.outputs.tarball }}
        # Publish the tarball directly (no `npm ci`/build here). Auth via OIDC
        # Trusted Publishing (no NODE_AUTH_TOKEN). publishConfig.provenance:true
        # is read from the tarball's own package.json, so provenance is emitted
        # for the tarball spec exactly as for a directory publish.
        run: npm publish "$TARBALL"

      # Fail-closed provenance assertion (INV-C1b): publishConfig.provenance:true
      # only *emits* provenance in a supported OIDC context. If the context ever
      # degrades (id-token narrowing, unsupported-context best-effort), the publish
      # still succeeds but ships no attestation. Assert the just-published version
      # actually carries an SLSA provenance attestation, distinguishing a registry
      # lookup error (retry, propagation lag) from a definitive "published but
      # unattested" (hard-fail). Never mask this step's exit.
      # Known operational limit (L1): this reads the dist.attestations metadata
      # shape rather than running the cryptographic `npm audit signatures`
      # verifier, and it does NOT compare the attestation subject digest against
      # the tarball this run built. It is ONLY an emission-liveness check — it
      # proves an attestation of the documented predicate type is *present*. It
      # does NOT prove the attestation is cryptographically valid, nor that it is
      # bound to our exact bytes; presence alone cannot rule out a false-green on
      # authenticity. Its one guarantee is fail-closed on ABSENCE (a missing or
      # degraded attestation hard-fails here). The authenticity + our-bytes checks
      # are the verify-published job's `npm audit signatures` and tarball-digest
      # comparison below.
      - name: Assert published provenance
        env:
          VERSION: ${{ needs.build-cli.outputs.version }}
        run: |
          set -euo pipefail
          echo "Asserting SLSA provenance for passwd-sso-cli@${VERSION}"
          for attempt in 1 2 3 4 5; do
            if VIEW=$(npm view "passwd-sso-cli@${VERSION}" --json 2>/dev/null); then
              PREDICATE=$(echo "$VIEW" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{try{const j=JSON.parse(d);process.stdout.write(j?.dist?.attestations?.provenance?.predicateType||'')}catch{process.stdout.write('')}})")
              if [ "$PREDICATE" = "https://slsa.dev/provenance/v1" ]; then
                echo "✓ SLSA provenance present"
                exit 0
              fi
              echo "attempt ${attempt}: attestation not yet visible (predicate='${PREDICATE}'); retrying for propagation lag"
            else
              echo "attempt ${attempt}: npm view failed (registry/network); retrying"
            fi
            sleep 15
          done
          echo "::error::published passwd-sso-cli@${VERSION} carries no SLSA provenance attestation after retries — OIDC provenance emission may have silently failed"
          exit 1

  # Cryptographic verification of the PUBLISHED package, in an UNPRIVILEGED job
  # (contents:read, no id-token). This closes the gap the old L1 comment deferred
  # to a "weekly sweep" that never actually covered this package: install the
  # just-published version into a clean scratch tree and run the official
  # `npm audit signatures` verifier against it — checking the registry signature
  # and provenance attestation cryptographically, not just metadata presence.
  # It runs `npm install`, so it deliberately lives OUTSIDE the publish job: no
  # OIDC token is mintable here even though it installs a package. Fails closed.
  verify-published:
    name: "Verify published package signature"
    needs: [release-please, build-cli, publish-cli]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      # Checkout so the provenance-source verifier script is available. This job
      # is unprivileged (contents:read, no id-token), so running repo code here
      # carries none of the publish job's risk.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.PUBLISH_NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"

      - name: Verify toolchain versions
        run: |
          set -euo pipefail
          test "$(node --version)" = "v${PUBLISH_NODE_VERSION}" \
            || { echo "::error::node $(node --version), expected v${PUBLISH_NODE_VERSION}"; exit 1; }
          test "$(npm --version)" = "${PUBLISH_NPM_VERSION}" \
            || { echo "::error::npm $(npm --version), expected ${PUBLISH_NPM_VERSION}"; exit 1; }

      - name: Verify published package signature
        env:
          VERSION: ${{ needs.build-cli.outputs.version }}
          EXPECTED_INTEGRITY: ${{ needs.build-cli.outputs.integrity }}
        run: |
          set -euo pipefail
          WORK=$(mktemp -d)
          trap 'rm -rf "$WORK"' EXIT
          cd "$WORK"
          npm init -y >/dev/null 2>&1
          # `set -e` does NOT abort on a failed `npm install` here — it runs as an
          # `if` condition, which errexit ignores. Track success explicitly so a
          # run where every attempt fails does NOT fall through to
          # `npm audit signatures` against an empty tree (which would "pass" and
          # report the published package as verified when it was never fetched).
          installed=false
          for attempt in 1 2 3 4 5; do
            if npm install --no-save --ignore-scripts "passwd-sso-cli@${VERSION}" >/dev/null 2>&1; then
              installed=true
              break
            fi
            echo "attempt ${attempt}: install of published version failed (propagation lag); retrying"
            # Explicit if (not `[ ] && sleep`) so the loop body's last command
            # never returns non-zero — keeps intent clear under `set -e`.
            if [ "$attempt" -lt 5 ]; then sleep 15; fi
          done
          if [ "$installed" != true ]; then
            echo "::error::failed to install passwd-sso-cli@${VERSION} after 5 attempts — cannot verify its signature"
            exit 1
          fi
          # Belt-and-suspenders: the package tree must actually exist and be the
          # exact version we published, so `npm audit signatures` is verifying the
          # intended bytes and not some other resolved version.
          [ -f node_modules/passwd-sso-cli/package.json ] || {
            echo "::error::passwd-sso-cli was not installed despite a reported success"
            exit 1
          }
          ACTUAL_VERSION=$(node -p "require('./node_modules/passwd-sso-cli/package.json').version")
          if [ "$ACTUAL_VERSION" != "$VERSION" ]; then
            echo "::error::installed version mismatch: expected=${VERSION}, actual=${ACTUAL_VERSION}"
            exit 1
          fi
          # Cryptographic signature + provenance verification of the published pkg.
          npm audit signatures
          # Bind the published bytes to the bytes build-cli produced: compare the
          # registry's dist.integrity for this version against the integrity we
          # recorded at pack time. Because publish-cli publishes the tarball spec
          # verbatim (not a directory re-pack), the registry integrity must equal
          # ours exactly. A mismatch means the published tarball is not the one we
          # built — fail closed.
          if ! PUBLISHED_INTEGRITY=$(npm view "passwd-sso-cli@${VERSION}" dist.integrity 2>/dev/null); then
            echo "::error::could not read published dist.integrity for passwd-sso-cli@${VERSION}"
            exit 1
          fi
          if [ -z "$PUBLISHED_INTEGRITY" ]; then
            echo "::error::published dist.integrity is empty for passwd-sso-cli@${VERSION}"
            exit 1
          fi
          if [ "$PUBLISHED_INTEGRITY" != "$EXPECTED_INTEGRITY" ]; then
            echo "::error::published tarball integrity does not match the build artifact"
            echo "  expected (built):  ${EXPECTED_INTEGRITY}"
            echo "  published (npm):   ${PUBLISHED_INTEGRITY}"
            exit 1
          fi
          echo "✓ published tarball integrity matches build artifact (${EXPECTED_INTEGRITY})"

      # Verify the provenance attestation's SOURCE IDENTITY, not just that a valid
      # signature exists. `npm audit signatures` proves the attestation is
      # cryptographically valid, but not WHICH repository/commit/workflow produced
      # it. Fetch the registry attestation bundle and assert the SLSA provenance
      # binds the published package to THIS repository, commit, and workflow —
      # all exact. The parser (verify-npm-provenance-source.mjs) fails CLOSED on a
      # missing/mismatched field, an absent provenance predicate, or an
      # unparseable bundle (a false-fail on a legitimate release, never a
      # false-pass). It is unit-tested against SLSA v1 fixtures. If a real release
      # fails here, inspect the bundle at ATT_URL against the parser's field paths
      # before assuming tampering; `npm audit signatures` above already confirmed
      # cryptographic validity.
      - name: Verify provenance source identity
        env:
          VERSION: ${{ needs.build-cli.outputs.version }}
          EXPECTED_REPO: ${{ github.repository }}
          EXPECTED_SHA: ${{ github.sha }}
          EXPECTED_WORKFLOW: ".github/workflows/release.yml"
          EXPECTED_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          ATT_URL="https://registry.npmjs.org/-/npm/v1/attestations/passwd-sso-cli@${VERSION}"
          if ! BUNDLE=$(curl -fsSL "$ATT_URL"); then
            echo "::error::could not fetch attestation bundle from ${ATT_URL}"
            exit 1
          fi
          printf '%s' "$BUNDLE" | node scripts/checks/verify-npm-provenance-source.mjs
