name: "Dependency Signatures"

# npm registry signature/attestation verification (`npm audit signatures`) also
# runs in the per-workspace PR audit jobs (ci.yml), but those are gated by
# dorny/paths-filter — they only fire on a PR that touches that workspace. A
# registry-side signature/attestation tamper of an already-installed, unchanged
# dependency would otherwise be re-verified only on the next PR touching that
# workspace (weeks for cli/extension). This weekly wall-clock sweep re-verifies
# all three trees against the registry independent of code changes.
#
# Needs no secret: `npm audit signatures` reads the public registry.

on:
  schedule:
    - cron: "0 4 * * 1" # Weekly, Monday 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-signatures:
    name: "Verify npm signatures (${{ matrix.workspace }})"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        include:
          - workspace: "root"
            dir: "."
          - workspace: "cli"
            dir: "cli"
          - workspace: "extension"
            dir: "extension"
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: ".nvmrc"

      # Pin npm to a version new enough to verify the current attestation format
      # (L2). This is the verifier's OWN role-based pin — check-publish-toolchain.sh
      # enforces it meets the floor, and does NOT require it to equal the publish
      # or Docker npm (each trust domain pins for its own need).
      - run: npm install -g npm@11.12.1 --ignore-scripts
      # Install without lifecycle scripts so a compromised dependency's install
      # script cannot run before `npm audit signatures` verifies it.
      - run: npm ci --ignore-scripts
      - run: npm audit signatures
