name: Refactor Phase Verify

# Runs the refactor orchestrator (scripts/refactor-phase-verify.mjs) on every
# push to refactor/* branches and in merge_group events. Complements the
# pre-pr.sh local gate by enforcing the phase checks server-side.
#
# See docs/archive/review/split-overcrowded-feature-dirs-plan.md §Phase 0
# prerequisites for why this workflow exists.

on:
  push:
    branches:
      - "refactor/**"
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: refactor-phase-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify refactor phase
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # fetch-depth: 0 is required because refactor-phase-verify.mjs and its
          # downstream scripts (verify-move-only-diff, verify-allowlist-rename-only,
          # check-vitest-coverage-include --enforce-rename-parity) call
          # `git diff main...HEAD` and `git show main:<path>`.
          fetch-depth: 0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - run: npm ci

      # Several refactor-phase-verify scripts (verify-move-only-diff,
      # check-vitest-coverage-include, etc.) compare against main via
      # `git show main:<path>` and `git diff main...HEAD`. actions/checkout
      # with fetch-depth: 0 fetches full history of the pushed ref but does
      # not create a local `main` branch. Explicitly fetch and create it.
      - name: Ensure main ref is available
        run: |
          set -euo pipefail
          if ! git rev-parse --verify main >/dev/null 2>&1; then
            git fetch origin main:main
          fi

      - name: refactor-phase-verify
        run: node scripts/refactor-phase-verify.mjs --force
