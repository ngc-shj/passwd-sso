name: ci-integration

# Round 4 S11/T12 fix: authoritative integration-test gate for auth/DB-touching PRs.
# Runs `npm run test:integration` against a live Postgres service. Blocking this
# job's result is set via repo branch-protection `required_status_checks` (not
# declared in this file — verify post-merge via `gh api .../branches/main/protection`).

on:
  pull_request:
    paths:
      - 'src/lib/auth/**'
      - 'src/lib/prisma.ts'
      - 'src/lib/prisma/**'
      - 'src/lib/redis.ts'
      - 'src/lib/tenant-rls.ts'
      - 'src/lib/tenant-context.ts'
      - 'src/lib/tenant/**'
      - 'prisma/schema.prisma'
      - 'prisma/migrations/**'

permissions:
  # Round 4 S23 fix: principle of least privilege — only content read needed.
  contents: read

jobs:
  integration:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          # Round 4 S22: ephemeral service-container credential — scoped to CI runner
          # localhost ONLY. DO NOT reuse in any real env.
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: passwd_test
          # Migration 20260413120000_convert_timestamp_to_timestamptz guards
          # against timezone-dependent USING clauses by requiring the server
          # timezone to be exactly 'UTC'. The default 'Etc/UTC' value used by
          # postgres:16 fails this guard. PGTZ sets the server timezone at
          # initdb time so the guard passes.
          PGTZ: UTC
          TZ: UTC
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5

    env:
      # Round 4 T19 fix: DATABASE_URL inline from service — no secrets.
      # Fork PRs run unchanged (no secret access required).
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/passwd_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Round 4 T31 fix: defensive `prisma generate` in case postinstall
      # doesn't run it (some npm configurations skip postinstall scripts).
      - name: Generate Prisma Client
        run: npx prisma generate

      # Round 4 T23 fix: use `migrate deploy` (idempotent, non-interactive) —
      # NOT `migrate dev` which is dev-only and may prompt on drift.
      # Matches precedent at ci.yml:270,337,423.
      - name: Apply database migrations
        run: npx prisma migrate deploy

      # GitHub Actions service containers do not mount initdb scripts, so the
      # `passwd_app` role (created by infra/postgres/initdb/02-create-app-role.sql
      # in dev) does not exist here. The `passwd_outbox_worker` role is created
      # by migration 20260412100001 but without a password. Bootstrap both
      # roles so the integration tests' role-specific connection strings
      # (helpers.ts:getConnectionString) can authenticate.
      #
      # Passwords match the dev fallback constants in 02-create-app-role.sql
      # so the tests' base→role substitution in helpers.ts works without
      # additional env vars. Tests still run as NOSUPERUSER/NOBYPASSRLS roles,
      # so RLS enforcement assertions remain valid.
      - name: Bootstrap application DB roles
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d passwd_test <<'EOF'
          -- passwd_outbox_worker: created by migration without password; set it now.
          ALTER ROLE passwd_outbox_worker WITH LOGIN PASSWORD 'passwd_outbox_pass';

          -- passwd_app: not created by any migration (lives in initdb only).
          -- Replicate the role + grants the integration tests rely on.
          DO $$ BEGIN
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'passwd_app') THEN
              CREATE ROLE passwd_app WITH LOGIN NOSUPERUSER NOBYPASSRLS NOCREATEDB NOCREATEROLE PASSWORD 'passwd_app_pass';
            END IF;
          END $$;
          GRANT CONNECT ON DATABASE passwd_test TO passwd_app;
          GRANT USAGE ON SCHEMA public TO passwd_app;
          GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO passwd_app;
          ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO passwd_app;
          GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO passwd_app;
          ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT USAGE, SELECT ON SEQUENCES TO passwd_app;
          EOF

      - name: Run integration tests
        env:
          # Superuser URL for migrations and DDL setup in tests (helpers.ts:23)
          MIGRATION_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/passwd_test
        run: npm run test:integration
