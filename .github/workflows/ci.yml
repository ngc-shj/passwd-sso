name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Change Detection (path-based job gating) ───────────────
  changes:
    name: "Detect changed areas"
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      extension: ${{ steps.filter.outputs.extension }}
      cli: ${{ steps.filter.outputs.cli }}
      e2e: ${{ steps.filter.outputs.e2e }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v4

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            app:
              - "Dockerfile"
              - "docker-compose*.yml"
              - "src/**"
              - "prisma/**"
              - "proxy.ts"
              - "instrumentation.ts"
              - "messages/**"
              - "package.json"
              - "package-lock.json"
              - "tsconfig*.json"
              - "vitest.config.*"
              - "eslint.config.*"
              - "next.config.*"
              - "scripts/**"
            extension:
              - "extension/**"
            cli:
              - "cli/**"
            e2e:
              - "e2e/**"
            ci:
              - ".github/workflows/ci.yml"
              - "scripts/check-licenses.mjs"

  # ─── Version Drift Check ──────────────────────────────────
  version-check:
    name: "Check: Version consistency"
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - name: Verify version consistency
        working-directory: ${{ github.workspace }}
        run: |
          ROOT_VER=$(node -p "require('./package.json').version") || exit 1
          CLI_VER=$(node -p "require('./cli/package.json').version") || exit 1
          EXT_VER=$(node -p "require('./extension/package.json').version") || exit 1

          echo "Root:      $ROOT_VER"
          echo "CLI:       $CLI_VER"
          echo "Extension: $EXT_VER"

          FAIL=0
          if [ "$CLI_VER" != "$ROOT_VER" ]; then
            echo "::error::CLI version ($CLI_VER) does not match root ($ROOT_VER)"
            FAIL=1
          fi
          if [ "$EXT_VER" != "$ROOT_VER" ]; then
            echo "::error::Extension version ($EXT_VER) does not match root ($ROOT_VER)"
            FAIL=1
          fi
          exit $FAIL

  # ─── Main App: Lint → Test → Build ────────────────────────
  app-ci:
    name: "App: Lint → Test → Build"
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.app == 'true' || needs.changes.outputs.ci == 'true'
    timeout-minutes: 15
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
      SHARE_MASTER_KEY: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
      AUTH_SECRET: "ci-secret-value-that-is-at-least-32-chars"
      AUTH_URL: "http://localhost:3000"
      VERIFIER_PEPPER_KEY: "bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb"
      REDIS_URL: "redis://localhost:6379"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - run: npm run lint
      - run: npm run check:team-auth-rls
      - run: npm run check:bypass-rls
      - run: npm run check:crypto-domains
      - run: npm test
      - run: npm run test:coverage
      - run: npm run build

      - name: Build with basePath
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /passwd-sso

      - name: Check fetch basePath compliance
        run: |
          if grep -rn --include='*.tsx' --include='*.ts' \
            -E 'fetch\((API_PATH\.|apiPath\.|`/api/|"/api/)' \
            src/ \
            --exclude-dir='src/app/api' \
            | grep -v 'fetchApi' | grep -v '\.test\.' \
            | grep -v 'src/proxy.ts' | grep -v 'src/lib/webhook-dispatcher.ts' \
            | grep -v 'src/lib/url-helpers.ts'; then
            echo "ERROR: Found fetch() calls that should use fetchApi()"
            exit 1
          fi

  # ─── Chrome Extension: Test → Build ───────────────────────
  extension-ci:
    name: "Extension: Test → Build"
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.extension == 'true' || needs.changes.outputs.ci == 'true'
    timeout-minutes: 10
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: "extension/package-lock.json"

      - run: npm ci
      - run: npm test
      - run: npm run build

      - name: Verify built manifest version matches root
        run: |
          EXPECTED=$(node -p "require('../package.json').version")
          ACTUAL=$(node -p "require('./dist/manifest.json').version")
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::Manifest version ($ACTUAL) does not match root ($EXPECTED)"
            exit 1
          fi

  # ─── CLI Tool: Build → Test ──────────────────────────────
  cli-ci:
    name: "CLI: Build → Test"
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.cli == 'true' || needs.changes.outputs.ci == 'true'
    timeout-minutes: 10
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: "cli/package-lock.json"

      - run: npm ci
      - run: npm run build
      - run: npm test

  # ─── E2E Tests (Playwright) ────────────────────────────────
  e2e:
    name: "E2E: Playwright"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [changes, app-ci]
    if: |
      always() &&
      (needs.changes.outputs.app == 'true' ||
       needs.changes.outputs.e2e == 'true' ||
       needs.changes.outputs.ci == 'true') &&
      needs.app-ci.result != 'failure'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ci -d ci"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
      SHARE_MASTER_KEY: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
      AUTH_SECRET: "ci-secret-value-that-is-at-least-32-chars"
      AUTH_URL: "http://localhost:3000"
      VERIFIER_PEPPER_KEY: "bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb"
      REDIS_URL: "redis://localhost:6379"
      E2E_ALLOW_DB_MUTATION: "true"
      # Dummy auth provider — production env validation requires at least one
      AUTH_GOOGLE_ID: "ci-google-id.apps.googleusercontent.com"
      AUTH_GOOGLE_SECRET: "ci-google-secret"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

  # ─── RLS Role Enforcement Smoke Test ────────────────────────
  rls-smoke:
    name: "RLS: Role separation smoke test"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.app == 'true' || needs.changes.outputs.ci == 'true'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: passwd_user
          POSTGRES_PASSWORD: passwd_pass
          POSTGRES_DB: passwd_sso
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U passwd_user -d passwd_sso"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: "postgresql://passwd_user:passwd_pass@localhost:5432/passwd_sso"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Create app role and grant privileges
        run: |
          psql postgresql://passwd_user:passwd_pass@localhost:5432/passwd_sso <<'SQL'
            CREATE ROLE passwd_app WITH LOGIN NOSUPERUSER NOBYPASSRLS
              NOCREATEDB NOCREATEROLE PASSWORD 'passwd_app_pass';
            REVOKE CREATE ON SCHEMA public FROM PUBLIC;
            GRANT CONNECT ON DATABASE passwd_sso TO passwd_app;
            GRANT USAGE ON SCHEMA public TO passwd_app;
            GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO passwd_app;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public
              GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO passwd_app;
            GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO passwd_app;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public
              GRANT USAGE, SELECT ON SEQUENCES TO passwd_app;
          SQL

      - name: Run migrations as SUPERUSER
        run: npx prisma migrate deploy
        env:
          MIGRATION_DATABASE_URL: "postgresql://passwd_user:passwd_pass@localhost:5432/passwd_sso"

      - name: Re-grant and seed test data
        run: |
          psql -v ON_ERROR_STOP=1 postgresql://passwd_user:passwd_pass@localhost:5432/passwd_sso <<'SQL'
            -- Re-grant DML on tables created by migration
            GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO passwd_app;
            GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO passwd_app;

            -- Seed test rows as SUPERUSER (bypasses RLS) to make assertions meaningful.
            -- Without data, count(*) = 0 is vacuously true regardless of RLS.
            -- Create parent records first to satisfy FK constraints.
            INSERT INTO tenants (id, name, slug, created_at, updated_at)
              VALUES ('00000000-0000-0000-0000-000000000001', 'rls-smoke-tenant', 'rls-smoke-tenant', NOW(), NOW());
            INSERT INTO users (id, tenant_id, email, created_at, updated_at)
              VALUES ('00000000-0000-0000-0000-000000000002', '00000000-0000-0000-0000-000000000001', 'rls-smoke@test.local', NOW(), NOW());
            INSERT INTO teams (id, tenant_id, name, slug, created_at, updated_at)
              VALUES (gen_random_uuid(), '00000000-0000-0000-0000-000000000001', 'rls-smoke', 'rls-smoke', NOW(), NOW());
            INSERT INTO service_accounts (id, tenant_id, name, identity_type, is_active, created_by_id, created_at, updated_at)
              VALUES (gen_random_uuid(), '00000000-0000-0000-0000-000000000001', 'rls-smoke-sa', 'SERVICE_ACCOUNT', true, '00000000-0000-0000-0000-000000000002', NOW(), NOW());
          SQL

      - name: Verify RLS enforcement
        run: |
          # Connect as passwd_app (non-SUPERUSER) — MUST use this role
          psql postgresql://passwd_app:passwd_app_pass@localhost:5432/passwd_sso <<'SQL'
            -- 1. Verify role flags
            DO $$ BEGIN
              ASSERT (SELECT NOT rolsuper FROM pg_roles WHERE rolname = current_user),
                'passwd_app must not be SUPERUSER';
              ASSERT (SELECT NOT rolbypassrls FROM pg_roles WHERE rolname = current_user),
                'passwd_app must not have BYPASSRLS';
            END $$;

            -- 2. Verify RLS blocks access to seeded rows without app.tenant_id
            DO $$ BEGIN
              ASSERT (SELECT count(*) = 0 FROM teams),
                'RLS must block access to teams without app.tenant_id';
              ASSERT (SELECT count(*) = 0 FROM service_accounts),
                'RLS must block access to service_accounts without app.tenant_id';
            END $$;
          SQL
          echo "✓ RLS enforcement verified: passwd_app cannot see seeded rows"

  # ─── Container Scan (Trivy) ─────────────────────────────────
  container-scan:
    name: "Trivy: Container image scan"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.app == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --build-arg DATABASE_URL=postgresql://dummy:dummy@localhost:5432/dummy -t passwd-sso:scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: "passwd-sso:scan"
          scan-type: image
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

  # ─── Security Audit: App ──────────────────────────────────
  audit-app:
    name: "Audit: App dependencies"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: changes
    if: needs.changes.outputs.app == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high

  # ─── Security Audit: Extension ────────────────────────────
  audit-ext:
    name: "Audit: Extension dependencies"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: changes
    if: needs.changes.outputs.extension == 'true' || needs.changes.outputs.ci == 'true'
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: "extension/package-lock.json"

      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high

  # ─── Security Audit: CLI ──────────────────────────────────
  audit-cli:
    name: "Audit: CLI dependencies"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: changes
    if: needs.changes.outputs.cli == 'true' || needs.changes.outputs.ci == 'true'
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: "cli/package-lock.json"

      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high

  # ─── License Audit ─────────────────────────────────────────
  license-audit:
    name: "Audit: Dependency licenses"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: changes
    if: |
      needs.changes.outputs.app == 'true' ||
      needs.changes.outputs.extension == 'true' ||
      needs.changes.outputs.cli == 'true' ||
      needs.changes.outputs.ci == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      # Lockfile-based check (no install required)
      - run: npm run licenses:check:strict
      - run: npm run licenses:check:ext:strict
      - run: npm run licenses:check:cli:strict
