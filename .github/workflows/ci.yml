name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Change Detection (path-based job gating) ───────────────
  changes:
    name: "Detect changed areas"
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      extension: ${{ steps.filter.outputs.extension }}
      cli: ${{ steps.filter.outputs.cli }}
      e2e: ${{ steps.filter.outputs.e2e }}
      ci: ${{ steps.filter.outputs.ci }}
      env: ${{ steps.filter.outputs.env }}
      ios: ${{ steps.filter.outputs.ios }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            app:
              - "Dockerfile"
              - "docker-compose*.yml"
              - "src/**"
              - "prisma/**"
              - "proxy.ts"
              - "instrumentation.ts"
              - "messages/**"
              - "package.json"
              - "package-lock.json"
              - "tsconfig*.json"
              - "vitest.config.*"
              - "eslint.config.*"
              - "next.config.*"
              - "scripts/**"
            extension:
              - "extension/**"
            cli:
              - "cli/**"
            ios:
              - "ios/**"
              - "extension/test/fixtures/**"
            e2e:
              - "e2e/**"
            ci:
              - ".github/workflows/ci.yml"
              - "scripts/checks/check-licenses.mjs"
            env:
              - ".env.example"
              - "src/lib/env.ts"
              - "src/lib/env-schema.ts"
              - "scripts/env-descriptions.ts"
              - "scripts/check-env-docs.ts"
              - "scripts/env-allowlist.ts"
              - "scripts/lib/compose-env-scan.ts"
              - "scripts/generate-env-example.ts"
              - "docker-compose.yml"
              - "docker-compose.override.yml"
              - "docker-compose.ha.yml"
              - "docker-compose.logging.yml"

  # ─── Env Drift Check ──────────────────────────────────────
  env-drift-check:
    name: env drift check
    needs: changes
    if: needs.changes.outputs.env == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run check:env-docs

  # ─── Version Drift Check ──────────────────────────────────
  version-check:
    name: "Check: Version consistency"
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify version consistency
        working-directory: ${{ github.workspace }}
        run: |
          ROOT_VER=$(node -p "require('./package.json').version") || exit 1
          CLI_VER=$(node -p "require('./cli/package.json').version") || exit 1
          EXT_VER=$(node -p "require('./extension/package.json').version") || exit 1
          # All MARKETING_VERSION lines in project.yml must carry one value
          # (sort -u collapses them; >1 distinct value fails the comparison).
          IOS_VER=$(grep -o 'MARKETING_VERSION: "[0-9.]*"' ios/project.yml \
            | grep -o '[0-9][0-9.]*' | sort -u | tr '\n' ' ' | sed 's/ $//')

          echo "Root:      $ROOT_VER"
          echo "CLI:       $CLI_VER"
          echo "Extension: $EXT_VER"
          echo "iOS:       $IOS_VER"

          FAIL=0
          if [ "$CLI_VER" != "$ROOT_VER" ]; then
            echo "::error::CLI version ($CLI_VER) does not match root ($ROOT_VER)"
            FAIL=1
          fi
          if [ "$EXT_VER" != "$ROOT_VER" ]; then
            echo "::error::Extension version ($EXT_VER) does not match root ($ROOT_VER)"
            FAIL=1
          fi
          if [ "$IOS_VER" != "$ROOT_VER" ]; then
            echo "::error::iOS MARKETING_VERSION ($IOS_VER) does not match root ($ROOT_VER)"
            FAIL=1
          fi
          exit $FAIL

  # ─── Secret Scan (gitleaks) ───────────────────────────────
  # Scans the working tree with a checksum-pinned gitleaks binary. Allowlists for
  # test fixtures / docs / known non-secret code markers live in .gitleaks.toml.
  # Uses the binary directly (not gitleaks-action) to keep the supply chain
  # pinned and avoid the action's license/telemetry surface. Always runs (not
  # gated on `changes`) — the local pre-pr hook only scans the staged diff.
  secret-scan:
    name: "Secret scan (gitleaks)"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pinned gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
          GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
        run: |
          set -euo pipefail
          curl -fsSL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar xzf gitleaks.tar.gz gitleaks
          ./gitleaks version

      - name: Scan working tree
        run: ./gitleaks dir . --config .gitleaks.toml --no-banner --redact

  # ─── Static Security Check Guards ─────────────────────────
  # Runs the environment-independent static guards from scripts/pre-pr.sh via
  # PRE_PR_STATIC_ONLY — same definition as the local pre-PR hook, so the
  # checks cannot drift between local and CI (R33). Always runs (not gated on
  # `changes`) so workflow-pinning and security guards are never skipped.
  static-checks:
    name: "Static: security check guards"
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # diff-based guards (prf-salt-immutable, R35 gate) need `main`

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - run: npm ci

      # actions/checkout with fetch-depth: 0 fetches full history of the PR ref
      # but does NOT create a local `main` branch. The static guards compare
      # against main (`git diff main...HEAD`); without this they fail open
      # (empty diff → vacuous pass). Same pattern as refactor-phase-verify.yml.
      - name: Ensure main ref is available
        run: |
          set -euo pipefail
          if ! git rev-parse --verify main >/dev/null 2>&1; then
            git fetch origin main:main
          fi

      # No `prisma generate` step: every static guard is a pure source/schema
      # grep (none import the generated client), so the client is not needed.
      - name: Run static check guards (PRE_PR_STATIC_ONLY)
        run: PRE_PR_STATIC_ONLY=1 bash scripts/pre-pr.sh

  # ─── Main App: Lint → Test → Build ────────────────────────
  app-ci:
    name: "App: Lint → Test → Build"
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.app == 'true' || needs.changes.outputs.ci == 'true'
    timeout-minutes: 15
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
      SHARE_MASTER_KEY: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
      AUTH_SECRET: "ci-secret-value-that-is-at-least-32-chars"
      AUTH_URL: "http://localhost:3000"
      VERIFIER_PEPPER_KEY: "bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb"
      REDIS_URL: "redis://localhost:6379"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - run: npm run lint
      # tsc --noEmit typechecks test files too (vitest does not; next build
      # excludes them), catching mock/type drift that would otherwise rot.
      - run: npm run typecheck
      - run: npm run check:team-auth-rls
      - run: npm run check:bypass-rls
      - run: npm run check:crypto-domains
      - run: npm run check:migration-drift
      - name: Check state-mutation centralization
        run: bash scripts/check-state-mutation-centralization.sh
      # `test:coverage` is `vitest run --coverage` — a strict superset of
      # `npm test` (`vitest run`). Running both back-to-back doubled the test
      # phase (~5m + ~6m) and pushed the job past its 15m timeout-minutes
      # cap, even though every step succeeded. Drop the bare run; the
      # coverage run carries the same pass/fail signal and the coverage
      # report is already produced (no artifact upload, but the report stays
      # available in the job log for spot inspection).
      - run: npm run test:coverage
      - run: npm run build

      - name: Build with basePath
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /passwd-sso

      - name: Check fetch basePath compliance
        run: |
          if grep -rn --include='*.tsx' --include='*.ts' \
            -E 'fetch\((API_PATH\.|apiPath\.|`/api/|"/api/)' \
            src/ \
            --exclude-dir='src/app/api' \
            | grep -v 'fetchApi' | grep -v '\.test\.' \
            | grep -v 'src/proxy.ts' | grep -v 'src/lib/webhook-dispatcher.ts' \
            | grep -v 'src/lib/url-helpers.ts'; then
            echo "ERROR: Found fetch() calls that should use fetchApi()"
            exit 1
          fi

  # ─── Chrome Extension: Test → Build ───────────────────────
  extension-ci:
    name: "Extension: Test → Build"
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.extension == 'true' || needs.changes.outputs.ci == 'true'
    timeout-minutes: 10
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: "extension/package-lock.json"

      - run: npm ci
      - run: npm test
      - run: npm run build

      - name: Verify built manifest version matches root
        run: |
          EXPECTED=$(node -p "require('../package.json').version")
          ACTUAL=$(node -p "require('./dist/manifest.json').version")
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::Manifest version ($ACTUAL) does not match root ($EXPECTED)"
            exit 1
          fi

  # ─── iOS App + AutoFill Extension: xcodebuild test ───────
  ios-ci:
    name: "iOS: xcodebuild test"
    runs-on: macos-latest
    needs: changes
    if: needs.changes.outputs.ios == 'true' || needs.changes.outputs.ci == 'true'
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Select latest stable Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Verify Backward-Compat Regression Contract paths exist
        run: |
          # Per plan §"Backward-Compatibility Regression Contract" — fail with a clear
          # message if any of the expected test files have moved or been deleted.
          contract_paths=(
            "extension/src/__tests__/api.test.ts"
            "extension/src/__tests__/background.test.ts"
            "extension/src/__tests__/lib/totp.test.ts"
            "extension/src/__tests__/lib/url-matching.test.ts"
            "extension/src/__tests__/background-login-save.test.ts"
            "src/app/api/extension/bridge-code/route.test.ts"
            "src/app/api/extension/token/route.test.ts"
            "src/app/api/extension/token/exchange/route.test.ts"
            "src/app/api/extension/token/refresh/route.test.ts"
          )
          missing=0
          for p in "${contract_paths[@]}"; do
            if [ ! -f "$p" ]; then
              echo "::error::Backward-compat contract path missing: $p"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ]

      - name: Regenerate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Verify project schemes
        working-directory: ios
        run: xcodebuild -project PasswdSSO.xcodeproj -list

      - name: Boot iOS Simulator
        id: sim
        run: |
          # Pick the first iPhone simulator with iOS 17.x or 18.x runtime; both are
          # acceptable since the deployment target is iOS 17.0. UDID-based destination
          # is the reliable form on Xcode 26.x (see ios/README.md).
          UDID=$(xcrun simctl list devices available | \
            grep -E "iPhone (15|16|17) " | \
            grep -oE '[0-9A-F-]{36}' | head -1)
          if [ -z "$UDID" ]; then
            UDID=$(xcrun simctl create "iPhone 16 Pro" "iPhone 16 Pro" "$(xcrun simctl list runtimes | grep -oE 'com.apple.CoreSimulator.SimRuntime.iOS-[0-9-]+' | head -1)")
          fi
          xcrun simctl boot "$UDID" 2>/dev/null || true
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: xcodebuild test
        run: |
          xcodebuild \
            -project ios/PasswdSSO.xcodeproj \
            -scheme PasswdSSOApp \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -configuration Debug \
            test

  # ─── CLI Tool: Build → Test ──────────────────────────────
  cli-ci:
    name: "CLI: Build → Test"
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.cli == 'true' || needs.changes.outputs.ci == 'true'
    timeout-minutes: 10
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: "cli/package-lock.json"

      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Verify package contents
        run: |
          FILES=$(npm pack --dry-run 2>&1)
          echo "$FILES"
          echo "$FILES" | grep -qP ' dist/index\.js$' || { echo "::error::dist/index.js missing from package"; exit 1; }
          echo "$FILES" | grep -q '\.js\.map' && { echo "::error::source maps should not be in package"; exit 1; } || true

  # ─── E2E Tests (Playwright) ────────────────────────────────
  e2e:
    name: "E2E: Playwright"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [changes, app-ci]
    if: |
      always() &&
      (needs.changes.outputs.app == 'true' ||
       needs.changes.outputs.e2e == 'true' ||
       needs.changes.outputs.ci == 'true') &&
      needs.app-ci.result != 'failure'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ci -d ci"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
      SHARE_MASTER_KEY: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
      AUTH_SECRET: "ci-secret-value-that-is-at-least-32-chars"
      AUTH_URL: "http://localhost:3000"
      VERIFIER_PEPPER_KEY: "bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb"
      REDIS_URL: "redis://localhost:6379"
      E2E_ALLOW_DB_MUTATION: "true"
      # Dummy auth provider — production env validation requires at least one
      AUTH_GOOGLE_ID: "ci-google-id.apps.googleusercontent.com"
      AUTH_GOOGLE_SECRET: "ci-google-secret"
      # A08-3: production env validation now requires the audit anchor
      # publisher to be enabled + configured (signing key + tag secret +
      # at least one destination). E2E runs a real production build so
      # the validation fires.
      AUDIT_ANCHOR_PUBLISHER_ENABLED: "true"
      AUDIT_ANCHOR_SIGNING_KEY: "cccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccc"
      AUDIT_ANCHOR_TAG_SECRET: "dddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddd"
      AUDIT_ANCHOR_DESTINATION_FS_PATH: "/tmp/ci-anchors"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Install Playwright browsers
        # All projects (chromium, mobile-ios with browserName override,
        # mobile-android) currently use chromium. Re-add webkit when the
        # WebKit cookie injection path in e2e/helpers/auth.ts is fixed.
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

  # ─── RLS Role Enforcement Smoke Test ────────────────────────
  rls-smoke:
    name: "RLS: Role separation smoke test"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.app == 'true' || needs.changes.outputs.ci == 'true'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: passwd_user
          # Literal value — must match env.PASSWD_SUPERUSER_PASSWORD below.
          # services.<name>.env is evaluated before the job env block, so we
          # cannot reference ${{ env.* }} here. CI is ephemeral; the literal
          # is the same as the helpers.ts integration-test fallback.
          POSTGRES_PASSWORD: passwd_pass
          POSTGRES_DB: passwd_sso
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U passwd_user -d passwd_sso"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      # CI is ephemeral; values match docker-compose dev fallbacks AND
      # helpers.ts integration-test fallbacks. Names mirror the
      # operator-facing vocabulary used by docker-compose so the
      # password-by-role mapping is consistent across the repo.
      PASSWD_SUPERUSER_PASSWORD: passwd_pass
      PASSWD_APP_PASSWORD: passwd_app_pass
      DATABASE_URL: "postgresql://passwd_user:passwd_pass@localhost:5432/passwd_sso"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Create app role and grant privileges
        run: |
          psql "postgresql://passwd_user:${PASSWD_SUPERUSER_PASSWORD}@localhost:5432/passwd_sso" <<SQL
            CREATE ROLE passwd_app WITH LOGIN NOSUPERUSER NOBYPASSRLS
              NOCREATEDB NOCREATEROLE PASSWORD '${PASSWD_APP_PASSWORD}';
            REVOKE CREATE ON SCHEMA public FROM PUBLIC;
            GRANT CONNECT ON DATABASE passwd_sso TO passwd_app;
            GRANT USAGE ON SCHEMA public TO passwd_app;
            GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO passwd_app;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public
              GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO passwd_app;
            GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO passwd_app;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public
              GRANT USAGE, SELECT ON SEQUENCES TO passwd_app;
          SQL

      - name: Run migrations as SUPERUSER
        run: npx prisma migrate deploy
        env:
          MIGRATION_DATABASE_URL: "postgresql://passwd_user:${{ env.PASSWD_SUPERUSER_PASSWORD }}@localhost:5432/passwd_sso"

      - name: Re-grant and seed test data
        run: psql -v ON_ERROR_STOP=1 "postgresql://passwd_user:${PASSWD_SUPERUSER_PASSWORD}@localhost:5432/passwd_sso" -f scripts/rls-smoke-seed.sql

      - name: Verify RLS enforcement
        run: |
          psql -v ON_ERROR_STOP=1 "postgresql://passwd_app:${PASSWD_APP_PASSWORD}@localhost:5432/passwd_sso" -f scripts/rls-smoke-verify.sql
          echo "✓ RLS enforcement verified: passwd_app cannot see seeded rows"

      - name: Cross-tenant seed (SUPERUSER)
        run: psql -v ON_ERROR_STOP=1 "postgresql://passwd_user:${PASSWD_SUPERUSER_PASSWORD}@localhost:5432/passwd_sso" -f scripts/rls-cross-tenant-seed.sql

      - name: Cross-tenant coverage check (SUPERUSER)
        run: psql -v ON_ERROR_STOP=1 "postgresql://passwd_user:${PASSWD_SUPERUSER_PASSWORD}@localhost:5432/passwd_sso" -f scripts/rls-cross-tenant-coverage.sql

      - name: Cross-tenant RLS predicate verify (NOSUPERUSER)
        run: |
          EXPECTED_TABLES=$(awk 'NF && $1 !~ /^#/ {gsub(/^[[:space:]]+|[[:space:]]+$/, "", $0); print}' scripts/rls-cross-tenant-tables.manifest | paste -sd,)
          psql -v ON_ERROR_STOP=1 -v expected_tables="$EXPECTED_TABLES" \
            "postgresql://passwd_app:${PASSWD_APP_PASSWORD}@localhost:5432/passwd_sso" \
            -f scripts/rls-cross-tenant-verify.sql

      - name: Cross-tenant verify negative test (gate self-check)
        run: bash scripts/rls-cross-tenant-negative-test.sh
        env:
          MIGRATION_DATABASE_URL: "postgresql://passwd_user:${{ env.PASSWD_SUPERUSER_PASSWORD }}@localhost:5432/passwd_sso"
          APP_DATABASE_URL: "postgresql://passwd_app:${{ env.PASSWD_APP_PASSWORD }}@localhost:5432/passwd_sso"
  # ─── Container Scan (Trivy) ─────────────────────────────────
  container-scan:
    name: "Trivy: Container image scan"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.app == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build Docker image
        run: docker build --build-arg DATABASE_URL=postgresql://dummy:dummy@localhost:5432/dummy -t passwd-sso:scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: "passwd-sso:scan"
          scan-type: image
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

  # ─── Security Audit: App ──────────────────────────────────
  audit-app:
    name: "Audit: App dependencies"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: changes
    if: needs.changes.outputs.app == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      # Audit-only job: install without lifecycle scripts so a compromised
      # dependency's install script cannot run before `npm audit signatures`
      # verifies it. Nothing is built after install here, so --ignore-scripts
      # is side-effect-free.
      - run: npm ci --ignore-scripts
      - run: npm audit --omit=dev --audit-level=high
      # Verify registry signatures/attestations of installed deps (and our own
      # published versions). Fails closed on tamper; do not mask its exit.
      - run: npm audit signatures

  # ─── Security Audit: Extension ────────────────────────────
  audit-ext:
    name: "Audit: Extension dependencies"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: changes
    if: needs.changes.outputs.extension == 'true' || needs.changes.outputs.ci == 'true'
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: "extension/package-lock.json"

      # Audit-only job: install without lifecycle scripts so a compromised
      # dependency's install script cannot run before `npm audit signatures`
      # verifies it. Nothing is built after install here, so --ignore-scripts
      # is side-effect-free.
      - run: npm ci --ignore-scripts
      - run: npm audit --omit=dev --audit-level=high
      - run: npm audit signatures

  # ─── Security Audit: CLI ──────────────────────────────────
  audit-cli:
    name: "Audit: CLI dependencies"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: changes
    if: needs.changes.outputs.cli == 'true' || needs.changes.outputs.ci == 'true'
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: "cli/package-lock.json"

      # Audit-only job: install without lifecycle scripts so a compromised
      # dependency's install script cannot run before `npm audit signatures`
      # verifies it. Nothing is built after install here, so --ignore-scripts
      # is side-effect-free.
      - run: npm ci --ignore-scripts
      - run: npm audit --omit=dev --audit-level=high
      - run: npm audit signatures

  # ─── License Audit ─────────────────────────────────────────
  license-audit:
    name: "Audit: Dependency licenses"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: changes
    if: |
      needs.changes.outputs.app == 'true' ||
      needs.changes.outputs.extension == 'true' ||
      needs.changes.outputs.cli == 'true' ||
      needs.changes.outputs.ci == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      # Lockfile-based check (no install required)
      - run: npm run licenses:check:strict
      - run: npm run licenses:check:ext:strict
      - run: npm run licenses:check:cli:strict
