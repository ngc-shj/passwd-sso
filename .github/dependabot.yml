# C24 (OWASP A06-4 / A08-1): Dependabot config for GitHub Actions SHA
# pinning. Without this, Actions pinned to a SHA (per C23) would not
# receive security patches — a new tag pointing at a vulnerability fix
# would land on upstream but the pinned SHA stays put.
#
# Weekly group bumps so all action SHAs land as one PR (avoids
# review fatigue from many single-action PRs).
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      actions:
        patterns:
          - "*"
    open-pull-requests-limit: 5

  # npm ecosystems (root app + CLI + extension). Grouped weekly bumps requiring
  # human review — NO auto-merge (a password manager must not treat an untrusted
  # upstream version bump as trusted; tests do not detect a supply-chain payload).
  # No swift ecosystem: iOS uses xcodegen with no Package.swift/Podfile for
  # Dependabot to read.
  # Crypto/auth-sensitive packages get their own Dependabot group so their bumps
  # land in a dedicated PR that warrants the deeper supply-chain review the
  # crypto-auth-deps-manifest exists to demand — separated from routine UI/tooling
  # bumps. The sensitive-patterns list mirrors the manifest's `packages` members;
  # keep the two in sync (a manifest addition of a new crypto/auth dep should add
  # its pattern here). General deps are grouped separately.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      npm-root-security-sensitive:
        patterns:
          - "next-auth"
          - "@auth/*"
          - "@simplewebauthn/*"
          - "hash-wasm"
          - "@prisma/*"
          - "pg"
          - "nodemailer"
          - "resend"
          - "otpauth"
      npm-root-general:
        patterns:
          - "*"
        exclude-patterns:
          - "next-auth"
          - "@auth/*"
          - "@simplewebauthn/*"
          - "hash-wasm"
          - "@prisma/*"
          - "pg"
          - "nodemailer"
          - "resend"
          - "otpauth"
    # ESLint 10 and TypeScript 6+ break peer tooling that has not caught up:
    # eslint-config-next (^16) targets the ESLint 9 API and crashes on 10
    # ("reading 'Cjs'"); TypeScript majors churn the lib.dom typings the app
    # depends on. Ignore the major line here; drop the entry once the peer
    # deps declare support.
    ignore:
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/cli"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      npm-cli-security-sensitive:
        patterns:
          - "bcrypt-pbkdf"
          - "otpauth"
      npm-cli-general:
        patterns:
          - "*"
        exclude-patterns:
          - "bcrypt-pbkdf"
          - "otpauth"
    # TypeScript 6+ regresses the Node type surface the CLI relies on
    # (e.g. global Buffer under the bundler moduleResolution). Stay on 5.x
    # until the toolchain is validated against the new major.
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/extension"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      npm-extension-security-sensitive:
        patterns:
          - "otpauth"
      npm-extension-general:
        patterns:
          - "*"
        exclude-patterns:
          - "otpauth"
    # Keep TypeScript on the 5.x line here too (see /cli note).
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    open-pull-requests-limit: 5
